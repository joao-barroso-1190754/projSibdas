                        <hr>
                    </div>
                </div>

                <div class="row">
                    <div class="col-xl-10 mx-auto">
                        <div class="alert alert-danger shadow-sm">
                            Erro Sample
                        </div>

                        <div class="card shadow-sm border-0 mb-5">
                            <div class="card-body bg-light p-4">

                                <form action="edit.php" method="POST">
                                    <input type="hidden" name="id" value="exemplo id">

                                    <h5 class="text-primary border-bottom pb-2 mb-4">Identificação Técnica</h5>
                                    <div class="row g-3 mb-4">
                                        <div class="col-md-3">
                                            <label class="form-label fw-bold">Código Interno <span
                                                    class="text-danger">*</span></label>
                                            <input type="text" class="form-control" name="codigo_interno" required
                                                value="exemplo código interno">
                                        </div>
                                        <div class="col-md-5">
                                            <label class="form-label fw-bold">Designação <span
                                                    class="text-danger">*</span></label>
                                            <input type="text" class="form-control" name="designacao" required
                                                value="exemplo designacao">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label fw-bold">Categoria</label>
                                            <select class="form-select" name="categoria">
                                                <option value="">Selecione...</option>
                                                <option value="Monitorização">Monitorização</option>
                                                <option value="Suporte de Vida">Suporte de Vida</option>
                                                <option value="Laboratório">Laboratório</option>
                                                <option value="Reagente/Consumível"
                                                    >Reagente/Consumível</option>
                                                <option value="Acessório/Componente"
                                                    >Acessório/Componente</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label fw-bold">Marca</label>
                                            <input type="text" class="form-control" name="marca"
                                                value="exemplo marca">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label fw-bold">Modelo</label>
                                            <input type="text" class="form-control" name="modelo"
                                                value="exemplo modelo">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label fw-bold">Número de Série</label>
                                            <input type="text" class="form-control" name="numero_serie"
                                                value="exemplo número de série">
                                        </div>
                                    </div>

                                    <h5 class="text-primary border-bottom pb-2 mb-4 mt-5">Hierarquia e Operação</h5>
                                    <div class="row g-3 mb-4">
                                        <div class="col-12 mb-3">
                                            <label class="form-label fw-bold text-muted">Item Principal (Se for
                                                componente)</label>
                                            <select class="form-select" name="parent_id">
                                                <option value="">Não aplicável</option>
                                                
                                                <option value="exemplo parent id">
                                                    exemplo código interno - exemplo designação
                                                </option>
                                            </select>
                                        </div>

                                        <div class="col-md-4">
                                            <label class="form-label fw-bold">Estado Atual <span
                                                    class="text-danger">*</span></label>
                                            <select class="form-select" name="estado" required>
                                                <option value="Ativo">Ativo</option>
                                                <option value="Em manutenção">Em manutenção</option>
                                                <option value="Inativo">Inativo</option>
                                                <option value="Abatido">Abatido</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label fw-bold">Criticidade</label>
                                            <select class="form-select" name="criticidade">
                                                <option value="Baixa">Baixa</option>
                                                <option value="Média">Média</option>
                                                <option value="Alta">Alta</option>
                                                <option value="Suporte de vida">Suporte de vida</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label fw-bold">Localização Atual <span
                                                    class="text-danger">*</span></label>
                                            <select class="form-select" name="localizacao_id" required>
                                                <option value="exemplo localizacao id">

                                                </option>
                                            </select>
                                        </div>
                                        <div class="col-12 mt-3">
                                            <label class="form-label fw-bold">Observações</label>
                                            <textarea class="form-control" name="observacoes"
                                                rows="2">['observacoes']</textarea>
                                        </div>
                                    </div>
